<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Platformer</title>
    <style>
      /* Apocalyptic display font for titles + subtitles (landing title, options
         panel headers). Self-hosted woff2 so it works offline; declared here in
         the document <head> so it's available to both the DOM overlays and
         Phaser's canvas-rendered text. */
      @font-face {
        font-family: 'Nosifer';
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        /* Relative path (matches vite base:'./') so the font resolves whether
           the build is hosted at the site root or a subpath. */
        src: url('./assets/fonts/nosifer-latin.woff2') format('woff2');
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: #000;
        overflow: hidden;
        height: 100%;
        width: 100%;
      }
      #game {
        width: 100vw;
        height: 100vh;
      }
      #game canvas {
        display: block;
        /* Phaser (Scale.RESIZE) sizes the canvas backing store in CSS pixels,
           so on a HiDPI/Retina/4K display (devicePixelRatio > 1) the browser
           upscales the canvas to physical pixels with bilinear filtering. That
           softens the pixel art and, worse, makes the blend boundaries shift
           every frame as a sprite moves — reading as blur/ghosting/doubling
           during fast motion. Force nearest-neighbour scaling so the upscale
           stays crisp. Mirrors image-rendering on the DOM pixel-art overlays.
           No-op on a 1:1 (DPR 1) display. */
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
